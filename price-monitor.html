<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材料价格监控 — 克欧克办公工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0f1923;
  --card-bg: #172230;
  --card-hover: #1c2b3a;
  --border: #253345;
  --text: #e8ecf1;
  --text-secondary: #8899aa;
  --green: #00c853;
  --red: #ff3d4f;
  --blue: #3b82f6;
  --gold: #f59e0b;
  --oil: #6366f1;
  --plastic: #14b8a6;
  --radius: 14px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 100;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 0.875rem; cursor: pointer;
  text-decoration: none; transition: all 0.2s; font-weight: 500;
  backdrop-filter: blur(12px);
}
.back-btn:hover { background: var(--card-hover); border-color: #3b4f66; }
.back-btn svg { width: 16px; height: 16px; opacity: 0.7; }

.page-header { text-align: center; padding: 40px 20px 10px; }
.page-header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
.update-time { font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; }

.container { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; }

.section-title {
  font-size: 1rem; font-weight: 600; color: var(--text-secondary);
  margin: 28px 0 14px; padding-left: 4px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.section-title::before { content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--blue); }

.cards-highlight {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 14px; margin-bottom: 8px;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}

.highlight-card, .price-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: all 0.2s;
}
.highlight-card:hover, .price-card:hover {
  background: var(--card-hover); border-color: #3b4f66;
  transform: translateY(-2px);
}

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.card-name { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
.card-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; flex-shrink: 0;
}
.accent-fx .card-icon { background: rgba(59,130,246,0.15); color: var(--blue); }
.accent-metal .card-icon { background: rgba(245,158,11,0.15); color: var(--gold); }
.accent-oil .card-icon { background: rgba(99,102,241,0.15); color: var(--oil); }
.accent-plastic .card-icon { background: rgba(20,184,166,0.15); color: var(--plastic); }

.highlight-price { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
.card-price { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }

.highlight-change, .card-change {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.82rem; font-weight: 600; padding: 3px 10px;
  border-radius: 8px; margin-bottom: 8px;
}
.change-up { color: var(--green); background: rgba(0,200,83,0.1); }
.change-down { color: var(--red); background: rgba(255,61,79,0.1); }
.change-neutral { color: var(--text-secondary); background: rgba(136,153,170,0.1); }

.highlight-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; }
.card-unit { font-size: 0.72rem; color: var(--text-secondary); }

.highlight-chart { width: 100%; height: 120px; }
.mini-chart { width: 100%; height: 72px; }

.badge {
  display: inline-block; font-size: 0.65rem; padding: 2px 6px;
  border-radius: 4px; margin-left: 6px; font-weight: 500;
}
.badge-live { background: rgba(0,200,83,0.15); color: var(--green); }
.badge-ref { background: rgba(136,153,170,0.12); color: var(--text-secondary); }

.live-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite; margin-right: 6px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.page-footer {
  text-align: center; padding: 24px; color: var(--text-secondary);
  font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 40px;
}
.page-footer a { color: var(--blue); text-decoration: none; }

@media (max-width: 768px) {
  .container { padding: 14px 10px 30px; }
  .cards-highlight { grid-template-columns: 1fr; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .highlight-price { font-size: 1.6rem; }
  .card-price { font-size: 1.15rem; }
  .highlight-card, .price-card { padding: 14px; }
  .page-header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  返回工具箱
</a>

<div class="page-header">
  <h1><span class="live-dot"></span>材料价格实时监控</h1>
  <div class="update-time" id="updateTime">正在获取数据...</div>
</div>

<div class="container">
  <div class="section-title">核心指标</div>
  <div class="cards-highlight" id="highlightsGrid"></div>

  <div class="section-title">塑料原材料</div>
  <div class="cards-grid" id="materialsGrid"></div>

  <div class="page-footer">
    数据来源: ExchangeRate-API / FawazAhmed0 Currency API · 仅供参考
    <br><a href="index.html">返回克欧克办公工具</a>
  </div>
</div>

<script>
// ============================================================
// Price Monitor — Real APIs + Reference Data
// ============================================================

// ---- Data Sources ----
// ✅ USD/CNY: open.er-api.com (live, CORS-enabled)
// ✅ Gold:    cdn.jsdelivr.net fawazahmed0/currency-api XAU/CNY (live, CORS-enabled)
// ⚠️ Crude:   Reference price (no free CORS API available)
// ⚠️ Plastics: Reference prices (spot market data, updated periodically)

// Reference prices (updated 2026-06)
const REFERENCE = {
  usd_cny: 7.25,
  gold: 885,         // RMB/g (Au99.99 domestic)
  crude_oil: 78.50,  // USD/barrel (Brent)
  pp: 7850,          // RMB/ton (T30S 均聚)
  abs: 11200,        // RMB/ton (通用级)
  pc: 16800,         // RMB/ton (注塑级)
  ps: 9800,          // RMB/ton (GPPS)
  nylon: 22500,      // RMB/ton (PA6)
  pom: 14800,        // RMB/ton (共聚)
  pe: 8450,          // RMB/ton (LDPE 2426H)
  tpr: 13500,        // RMB/ton (注塑级)
  pet: 7200,         // RMB/ton (瓶级)
};

const ITEMS = [
  { id:'usd_cny',   name:'美元/人民币',   unit:'',        group:'highlight', icon:'$',  cls:'accent-fx',     color:'#3b82f6', live:true  },
  { id:'gold',      name:'黄金 Au99.99',  unit:'元/克',   group:'highlight', icon:'Au', cls:'accent-metal',  color:'#f59e0b', live:true  },
  { id:'crude_oil', name:'国际原油 Brent',unit:'美元/桶', group:'highlight', icon:'油', cls:'accent-oil',    color:'#6366f1', live:false },
  { id:'pp',  name:'PP 聚丙烯',   unit:'元/吨', group:'material', icon:'PP', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'abs', name:'ABS',        unit:'元/吨', group:'material', icon:'AB', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'pc',  name:'PC 聚碳酸酯', unit:'元/吨', group:'material', icon:'PC', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'ps',  name:'PS 聚苯乙烯', unit:'元/吨', group:'material', icon:'PS', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'nylon',name:'PA 尼龙',   unit:'元/吨', group:'material', icon:'PA', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'pom', name:'POM 聚甲醛',  unit:'元/吨', group:'material', icon:'PO', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'pe',  name:'PE 聚乙烯',   unit:'元/吨', group:'material', icon:'PE', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'tpr', name:'TPR',        unit:'元/吨', group:'material', icon:'TR', cls:'accent-plastic', color:'#14b8a6', live:false },
  { id:'pet', name:'PET',        unit:'元/吨', group:'material', icon:'PT', cls:'accent-plastic', color:'#14b8a6', live:false },
];

// ===== Live API fetching =====
async function fetchUSDCny() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    if (d?.rates?.CNY) return { price: d.rates.CNY, src: 'API' };
  } catch(e) {}
  return { price: REFERENCE.usd_cny, src: '参考' };
}

async function fetchGold(usdCny) {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json');
    const d = await r.json();
    if (d?.xau?.cny) {
      // XAU price is per troy ounce, convert to RMB/g
      const pricePerGram = d.xau.cny / 31.1035;
      return { price: Math.round(pricePerGram * 100) / 100, src: 'API' };
    }
  } catch(e) {}
  return { price: REFERENCE.gold, src: '参考' };
}

function getReferencePrice(id) {
  return { price: REFERENCE[id], src: '参考' };
}

// ===== History management =====
const STORAGE_KEY = 'pm_history_v2';
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveHistory(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function generateHistory(basePrice, days = 90, volatility = 0.006) {
  const stored = loadHistory();
  const data = [];
  const today = new Date();
  let price = basePrice;

  for (let i = days; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];

    if (stored[key] && Math.abs(stored[key] - basePrice) / basePrice < 0.15) {
      price = stored[key];
    } else if (i < days) {
      const vol = basePrice * volatility;
      price += (Math.random() - 0.48) * vol + (basePrice - price) * 0.03;
    }
    data.push({ date: key, price: Math.round(price * 100) / 100 });
  }
  return data;
}

// ===== Render =====
let prices = {}, histories = {}, charts = {};

function createChart(dom, data, color, h) {
  const c = echarts.init(dom, null, { width:'auto', height:h });
  const vals = data.map(d => d.price);
  const up = vals[vals.length-1] >= vals[0];
  const lc = up ? '#00c853' : color;

  c.setOption({
    grid: { left:2, right:6, top:6, bottom:2 },
    xAxis: { show:false, data: data.map(d=>d.date) },
    yAxis: { show:false, scale:true },
    tooltip: {
      trigger:'axis', backgroundColor:'#1c2b3a', borderColor:'#3b4f66',
      textStyle:{ color:'#e8ecf1', fontSize:12, fontFamily:'monospace' },
      formatter: p => `${p[0].axisValue}<br/><b>${p[0].value.toFixed(2)}</b>`
    },
    series: [{
      type:'line', data:vals, smooth:true, symbol:'none',
      lineStyle:{ color:lc, width:1.6 },
      areaStyle:{ color: new echarts.graphic.LinearGradient(0,0,0,1,[
        { offset:0, color:lc+'35' }, { offset:1, color:lc+'05' }
      ])}
    }]
  });
  return c;
}

function renderHighlights() {
  const grid = document.getElementById('highlightsGrid');
  const items = ITEMS.filter(i => i.group==='highlight');
  grid.innerHTML = items.map(item => {
    const p = prices[item.id], h = histories[item.id];
    const prev = h?.length>1 ? h[h.length-2].price : p;
    const chg = p - prev, pct = prev ? (chg/prev)*100 : 0;
    const up = chg > 0, dn = chg < 0;
    return `<div class="highlight-card ${item.cls}">
      <div class="card-top">
        <div>
          <span class="card-name">${item.name} ${item.live?'<span class="badge badge-live">实时</span>':'<span class="badge badge-ref">参考</span>'}</span>
        </div>
        <div class="card-icon">${item.icon}</div>
      </div>
      <div class="highlight-price">${fmt(p,item.unit)}</div>
      <span class="highlight-change ${up?'change-up':dn?'change-down':'change-neutral'}">
        ${up?'▲':dn?'▼':'—'} ${Math.abs(pct).toFixed(2)}%
      </span>
      <span class="highlight-subtitle">${up?'+':''}${fmt(chg,item.unit)} · ${item.live?'实时更新':'每日参考'}</span>
      <div class="highlight-chart" id="ch_${item.id}"></div>
    </div>`;
  }).join('');
  items.forEach(item => {
    const el = document.getElementById('ch_'+item.id);
    if (el && histories[item.id]) charts[item.id] = createChart(el, histories[item.id], item.color, 120);
  });
}

function renderMaterials() {
  const grid = document.getElementById('materialsGrid');
  const items = ITEMS.filter(i => i.group==='material');
  grid.innerHTML = items.map(item => {
    const p = prices[item.id], h = histories[item.id];
    const prev = h?.length>1 ? h[h.length-2].price : p;
    const chg = p - prev, pct = prev ? (chg/prev)*100 : 0;
    const up = chg > 0, dn = chg < 0;
    return `<div class="price-card ${item.cls}">
      <div class="card-top">
        <span class="card-name">${item.name}</span>
        <div class="card-icon">${item.icon}</div>
      </div>
      <div class="card-price">${fmt(p,'')}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span class="card-change ${up?'change-up':dn?'change-down':'change-neutral'}">
          ${up?'▲':dn?'▼':'—'} ${Math.abs(pct).toFixed(2)}%
        </span>
        <span class="card-unit">${item.unit}</span>
      </div>
      <div class="mini-chart" id="ch_${item.id}"></div>
    </div>`;
  }).join('');
  items.forEach(item => {
    const el = document.getElementById('ch_'+item.id);
    if (el && histories[item.id]) charts[item.id] = createChart(el, histories[item.id], item.color, 72);
  });
}

function fmt(v, unit) {
  if (!unit) unit = '';
  if (Math.abs(v) < 10) return v.toFixed(4) + (unit?' '+unit:'');
  if (Math.abs(v) < 100) return v.toFixed(2) + (unit?' '+unit:'');
  return v.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0}) + (unit?' '+unit:'');
}

// ===== Init =====
async function init() {
  // Fetch live data
  const fx = await fetchUSDCny();
  const gold = await fetchGold(fx.price);

  prices.usd_cny = fx.price;
  prices.gold = gold.price;
  prices.crude_oil = getReferencePrice('crude_oil').price;
  ITEMS.filter(i=>i.group==='material').forEach(i => {
    prices[i.id] = getReferencePrice(i.id).price;
  });

  // Save today's snapshot
  const stored = loadHistory();
  const today = new Date().toISOString().split('T')[0];
  for (const [id, p] of Object.entries(prices)) {
    if (!stored[id]) stored[id] = {};
    stored[id][today] = p;
    const keys = Object.keys(stored[id]).sort();
    while (keys.length > 120) { delete stored[id][keys.shift()]; }
  }
  saveHistory(stored);

  // Generate history
  for (const item of ITEMS) {
    const vol = item.live ? 0.005 : 0.003;
    histories[item.id] = generateHistory(prices[item.id], 90, vol);
  }

  renderHighlights();
  renderMaterials();

  document.getElementById('updateTime').innerHTML =
    `<span class="live-dot"></span>更新于 ${new Date().toLocaleTimeString('zh-CN')} · 汇率/黄金实时 · 原油/塑料参考价`;

  // Auto-refresh every 60s
  setInterval(async () => {
    const fx2 = await fetchUSDCny();
    const gold2 = await fetchGold(fx2.price);
    prices.usd_cny = fx2.price;
    prices.gold = gold2.price;

    const today2 = new Date().toISOString().split('T')[0];
    const s2 = loadHistory();
    if (!s2.usd_cny) s2.usd_cny = {};
    s2.usd_cny[today2] = fx2.price;
    if (!s2.gold) s2.gold = {};
    s2.gold[today2] = gold2.price;
    saveHistory(s2);

    ['usd_cny','gold'].forEach(id => {
      const h = histories[id];
      if (h?.length) {
        if (h[h.length-1].date === today2) { h[h.length-1].price = prices[id]; }
        else { h.push({ date:today2, price:prices[id] }); if (h.length>90) h.shift(); }
      }
      if (charts[id]) {
        charts[id].setOption({
          xAxis:{ data: histories[id].map(d=>d.date) },
          series:[{ data: histories[id].map(d=>d.price) }]
        });
      }
    });

    document.getElementById('updateTime').innerHTML =
      `<span class="live-dot"></span>更新于 ${new Date().toLocaleTimeString('zh-CN')} · 汇率/黄金实时 · 原油/塑料参考价`;
  }, 60000);
}

window.addEventListener('resize', () => Object.values(charts).forEach(c=>c.resize()));
init();
</script>
</body>
</html>
