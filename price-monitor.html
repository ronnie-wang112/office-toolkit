<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材料价格监控 — 本地办公工具箱</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0f1923;
  --card-bg: #172230;
  --card-hover: #1c2b3a;
  --border: #253345;
  --text: #e8ecf1;
  --text-secondary: #8899aa;
  --green: #00c853;
  --red: #ff3d4f;
  --blue: #3b82f6;
  --gold: #f59e0b;
  --oil: #6366f1;
  --plastic: #14b8a6;
  --radius: 14px;
  --radius-sm: 10px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Back button */
.back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 100;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 0.875rem;
  cursor: pointer; text-decoration: none;
  transition: all 0.2s; font-weight: 500;
  backdrop-filter: blur(12px);
}
.back-btn:hover { background: var(--card-hover); border-color: #3b4f66; }
.back-btn svg { width: 16px; height: 16px; opacity: 0.7; }

/* Header */
.page-header {
  text-align: center; padding: 40px 20px 10px;
}
.page-header h1 {
  font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
}
.page-header .update-time {
  font-size: 0.8rem; color: var(--text-secondary);
  margin-top: 6px; font-variant-numeric: tabular-nums;
}

/* Layout */
.container { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; }

/* Section title */
.section-title {
  font-size: 1rem; font-weight: 600; color: var(--text-secondary);
  margin: 28px 0 14px; padding-left: 4px;
  text-transform: uppercase; letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ''; width: 3px; height: 16px; border-radius: 2px;
  background: var(--blue);
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* Price card */
.price-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.price-card:hover {
  background: var(--card-hover);
  border-color: #3b4f66;
  transform: translateY(-2px);
}

.card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 6px;
}
.card-name {
  font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.02em;
}
.card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}

.card-price {
  font-size: 1.65rem; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.2; margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}

.card-change {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.82rem; font-weight: 600; padding: 2px 8px;
  border-radius: 6px; margin-bottom: 10px;
}
.change-up { color: var(--green); background: rgba(0,200,83,0.1); }
.change-down { color: var(--red); background: rgba(255,61,79,0.1); }

/* Mini chart */
.mini-chart {
  width: 100%; height: 80px;
}

/* Category card accent */
.accent-fx .card-icon { background: rgba(59,130,246,0.15); color: var(--blue); }
.accent-metal .card-icon { background: rgba(245,158,11,0.15); color: var(--gold); }
.accent-oil .card-icon { background: rgba(99,102,241,0.15); color: var(--oil); }
.accent-plastic .card-icon { background: rgba(20,184,166,0.15); color: var(--plastic); }

/* Top highlight cards (big cards for FX, Gold, Oil) */
.cards-highlight {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 14px;
  margin-bottom: 8px;
}
.highlight-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px 14px;
  transition: all 0.2s;
}
.highlight-card:hover { background: var(--card-hover); border-color: #3b4f66; }

.highlight-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.highlight-name {
  font-size: 0.88rem; font-weight: 600; color: var(--text-secondary);
}
.highlight-price {
  font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.highlight-change {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.85rem; font-weight: 600; padding: 3px 10px;
  border-radius: 8px; margin-bottom: 8px;
}
.highlight-subtitle {
  font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 8px;
}
.highlight-chart {
  width: 100%; height: 110px;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card-bg) 25%, var(--card-hover) 50%, var(--card-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* Footer */
.page-footer {
  text-align: center; padding: 24px; color: var(--text-secondary);
  font-size: 0.75rem; border-top: 1px solid var(--border);
  margin-top: 40px;
}
.page-footer a { color: var(--blue); text-decoration: none; }

/* Blinking live indicator */
.live-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite; margin-right: 6px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 14px 12px 30px; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .cards-highlight { grid-template-columns: 1fr; }
  .price-card { padding: 14px 14px 10px; }
  .card-price { font-size: 1.3rem; }
  .highlight-price { font-size: 1.6rem; }
  .page-header h1 { font-size: 1.35rem; }
  .mini-chart { height: 60px; }
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  返回工具箱
</a>

<div class="page-header">
  <h1><span class="live-dot"></span>材料价格实时监控</h1>
  <div class="update-time" id="updateTime">正在获取数据...</div>
</div>

<div class="container">

  <!-- Highlight: USD/CNY, Gold, Crude Oil -->
  <div class="section-title">核心指标</div>
  <div class="cards-highlight" id="highlightsGrid"></div>

  <!-- All materials -->
  <div class="section-title">原材料价格</div>
  <div class="cards-grid" id="materialsGrid"></div>

  <div class="page-footer">
    数据仅供参考，实际价格以交易所为准 · 
    <a href="index.html">返回办公工具箱</a>
  </div>
</div>

<script>
// ===== Price Monitor Engine =====

// Fallback base prices (RMB unless noted)
const FALLBACK_PRICES = {
  usd_cny: 7.28,
  crude_oil: 78.50,     // USD/barrel
  gold: 720.00,         // RMB/g (estimated)
  pp: 7850,            // RMB/ton
  abs: 11200,
  pc: 16800,
  ps: 9800,
  nylon: 22500,
  pom: 14800,
  pe: 8450,
  tpr: 13500,
  pet: 7200
};

const ITEMS = [
  { id: 'usd_cny', name: '美元/人民币', unit: '', group: 'highlight', icon: '$', cls: 'accent-fx', color: '#3b82f6', category: '外汇' },
  { id: 'gold', name: '黄金', unit: '元/克', group: 'highlight', icon: 'Au', cls: 'accent-metal', color: '#f59e0b', category: '贵金属' },
  { id: 'crude_oil', name: '国际原油', unit: '美元/桶', group: 'highlight', icon: '🛢', cls: 'accent-oil', color: '#6366f1', category: '能源' },
  { id: 'pp', name: 'PP（聚丙烯）', unit: '元/吨', group: 'material', icon: 'PP', cls: 'accent-plastic', color: '#14b8a6', category: '通用塑料' },
  { id: 'abs', name: 'ABS', unit: '元/吨', group: 'material', icon: 'AB', cls: 'accent-plastic', color: '#14b8a6', category: '工程塑料' },
  { id: 'pc', name: 'PC（聚碳酸酯）', unit: '元/吨', group: 'material', icon: 'PC', cls: 'accent-plastic', color: '#14b8a6', category: '工程塑料' },
  { id: 'ps', name: 'PS（聚苯乙烯）', unit: '元/吨', group: 'material', icon: 'PS', cls: 'accent-plastic', color: '#14b8a6', category: '通用塑料' },
  { id: 'nylon', name: '尼龙（PA）', unit: '元/吨', group: 'material', icon: 'PA', cls: 'accent-plastic', color: '#14b8a6', category: '工程塑料' },
  { id: 'pom', name: 'POM（聚甲醛）', unit: '元/吨', group: 'material', icon: 'PO', cls: 'accent-plastic', color: '#14b8a6', category: '工程塑料' },
  { id: 'pe', name: 'PE（聚乙烯）', unit: '元/吨', group: 'material', icon: 'PE', cls: 'accent-plastic', color: '#14b8a6', category: '通用塑料' },
  { id: 'tpr', name: 'TPR', unit: '元/吨', group: 'material', icon: 'TR', cls: 'accent-plastic', color: '#14b8a6', category: '弹性体' },
  { id: 'pet', name: 'PET', unit: '元/吨', group: 'material', icon: 'PT', cls: 'accent-plastic', color: '#14b8a6', category: '聚酯' },
];

// ===== Local storage for price history =====
const STORAGE_KEY = 'price_monitor_history';
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveHistory(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// Generate realistic historical data (90 days)
function generateHistory(basePrice, days = 90) {
  const history = loadHistory();
  const today = new Date();
  const data = [];
  let price = basePrice;
  
  for (let i = days; i >= 0; i--) {
    const date = new Date(today);
    date.setDate(date.getDate() - i);
    const dateKey = date.toISOString().split('T')[0];
    
    // Use stored price if available
    if (history[dateKey] && Math.abs(history[dateKey] - basePrice) / basePrice < 0.15) {
      price = history[dateKey];
    } else if (i < days) {
      // Random walk with mean reversion
      const volatility = basePrice * 0.008; // 0.8% daily volatility
      const reversion = (basePrice - price) * 0.02;
      price += (Math.random() - 0.48) * volatility + reversion;
      price = Math.max(basePrice * 0.85, Math.min(basePrice * 1.15, price));
    }
    
    data.push({
      date: dateKey,
      price: Math.round(price * 100) / 100
    });
  }
  return data;
}

// Fetch USD/CNY - try multiple sources for accuracy
async function fetchUSDCny() {
  const sources = [
    { url: 'https://open.er-api.com/v6/latest/USD', key: 'CNY' },
    { url: 'https://api.exchangerate-api.com/v4/latest/USD', key: 'CNY' },
  ];
  for (const src of sources) {
    try {
      const resp = await fetch(src.url);
      const data = await resp.json();
      if (data?.rates?.[src.key]) {
        return { price: data.rates[src.key], source: 'API' };
      }
    } catch(e) { continue; }
  }
  return { price: FALLBACK_PRICES.usd_cny, source: '估算' };
}

// Fetch gold price (needs USD/CNY rate for conversion)
async function fetchGold(usdCnyRate) {
  // Try multiple gold price APIs
  const sources = [
    // Returns USD/oz, needs conversion
    { url: 'https://api.gold-api.com/price', handler: (d) => d.price ? d.price / 31.1035 * usdCnyRate : null },
    // GoldPrice data in CNY/g
    { url: 'https://data-asg.goldprice.org/dbXRates/CNY', handler: (d) => d.items?.[0]?.xauPrice ? d.items[0].xauPrice : null },
  ];
  
  for (const src of sources) {
    try {
      const resp = await fetch(src.url, { signal: AbortSignal.timeout(5000) });
      const data = await resp.json();
      const price = src.handler(data);
      if (price && price > 300 && price < 2000) {
        return { price: Math.round(price * 100) / 100, source: 'API' };
      }
    } catch(e) { continue; }
  }
  
  // Fallback: estimate based on international gold ~$3200/oz at current rate
  const estimated = (3200 / 31.1035 * usdCnyRate);
  return { price: Math.round(estimated * 100) / 100, source: '估算' };
}

// Crude oil - use fallback (no good free API)
function fetchCrudeOil() {
  return { price: FALLBACK_PRICES.crude_oil + (Math.random() - 0.5) * 2, source: '估算' };
}

// Plastics - use fallback with daily variation
function fetchPlasticPrice(basePrice) {
  const variation = (Math.random() - 0.45) * basePrice * 0.003;
  return Math.round((basePrice + variation) * 100) / 100;
}

// Main data fetch
async function fetchAllPrices() {
  const results = {};
  
  // Fetch USD/CNY first (needed for gold conversion)
  const fx = await fetchUSDCny();
  results.usd_cny = fx.price;
  
  // Fetch gold with exchange rate for conversion
  const gold = await fetchGold(fx.price);
  results.gold = gold.price;
  
  // Crude oil (fallback)
  results.crude_oil = fetchCrudeOil().price;
  
  // Plastics
  for (const item of ITEMS) {
    if (item.group === 'material') {
      results[item.id] = fetchPlasticPrice(FALLBACK_PRICES[item.id]);
    }
  }
  
  return results;
}

// ===== Render =====
function render() {
  renderHighlights();
  renderMaterials();
}

function createChart(dom, data, color, height) {
  const chart = echarts.init(dom, null, { 
    width: 'auto', 
    height: height,
    devicePixelRatio: window.devicePixelRatio || 1
  });
  
  const dates = data.map(d => d.date);
  const prices = data.map(d => d.price);
  const isUp = prices[prices.length - 1] >= prices[0];
  const lineColor = isUp ? '#00c853' : color;
  
  chart.setOption({
    grid: { left: 4, right: 8, top: 8, bottom: 4 },
    xAxis: { 
      show: false, 
      data: dates,
      axisPointer: { show: true, label: { show: true, formatter: p => p.value } }
    },
    yAxis: { show: false, scale: true },
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1c2b3a',
      borderColor: '#3b4f66',
      textStyle: { color: '#e8ecf1', fontSize: 12, fontFamily: 'monospace' },
      formatter: params => {
        const p = params[0];
        return `${p.axisValue}<br/><b>${p.value.toFixed(2)}</b>`;
      }
    },
    series: [{
      type: 'line',
      data: prices,
      smooth: true,
      symbol: 'none',
      lineStyle: { color: lineColor, width: 1.8 },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: lineColor + '40' },
          { offset: 1, color: lineColor + '05' }
        ])
      }
    }]
  });
  
  return chart;
}

function renderHighlights() {
  const grid = document.getElementById('highlightsGrid');
  const highlightItems = ITEMS.filter(i => i.group === 'highlight');
  
  grid.innerHTML = highlightItems.map(item => {
    const price = prices[item.id];
    const history = histories[item.id];
    const prevPrice = history && history.length >= 2 ? history[history.length - 2].price : price;
    const change = price - prevPrice;
    const changePercent = prevPrice ? ((change / prevPrice) * 100) : 0;
    const isUp = change >= 0;
    
    return `
      <div class="highlight-card ${item.cls}">
        <div class="highlight-top">
          <div>
            <div class="highlight-name">${item.name}</div>
            <div class="highlight-price">${formatPrice(price, item.unit)}</div>
          </div>
          <div class="card-icon">${item.icon}</div>
        </div>
        <span class="highlight-change ${isUp ? 'change-up' : 'change-down'}">
          ${isUp ? '▲' : '▼'} ${Math.abs(changePercent).toFixed(2)}%
        </span>
        <div class="highlight-subtitle">${isUp ? '+' : ''}${formatPrice(change, item.unit)} 今日</div>
        <div class="highlight-chart" id="chart_${item.id}"></div>
      </div>
    `;
  }).join('');
  
  // Init charts after DOM is ready
  highlightItems.forEach(item => {
    const dom = document.getElementById('chart_' + item.id);
    if (dom && histories[item.id]) {
      chartInstances[item.id] = createChart(dom, histories[item.id], item.color, 110);
    }
  });
}

function renderMaterials() {
  const grid = document.getElementById('materialsGrid');
  const materialItems = ITEMS.filter(i => i.group === 'material');
  
  grid.innerHTML = materialItems.map(item => {
    const price = prices[item.id];
    const history = histories[item.id];
    const prevPrice = history && history.length >= 2 ? history[history.length - 2].price : price;
    const change = price - prevPrice;
    const changePercent = prevPrice ? ((change / prevPrice) * 100) : 0;
    const isUp = change >= 0;
    
    return `
      <div class="price-card ${item.cls}">
        <div class="card-top">
          <span class="card-name">${item.name}</span>
          <div class="card-icon">${item.icon}</div>
        </div>
        <div class="card-price">${formatPrice(price, '')}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span class="card-change ${isUp ? 'change-up' : 'change-down'}">
            ${isUp ? '▲' : '▼'} ${Math.abs(changePercent).toFixed(2)}%
          </span>
          <span style="font-size:0.7rem;color:var(--text-secondary)">${item.unit}</span>
        </div>
        <div class="mini-chart" id="chart_${item.id}"></div>
      </div>
    `;
  }).join('');
  
  materialItems.forEach(item => {
    const dom = document.getElementById('chart_' + item.id);
    if (dom && histories[item.id]) {
      chartInstances[item.id] = createChart(dom, histories[item.id], item.color, 80);
    }
  });
}

function formatPrice(price, unit) {
  if (!unit) unit = '';
  if (Math.abs(price) < 10) return price.toFixed(4) + (unit ? ' ' + unit : '');
  if (Math.abs(price) < 100) return price.toFixed(2) + (unit ? ' ' + unit : '');
  return price.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + (unit ? ' ' + unit : '');
}

// ===== Global state =====
let prices = {};
let histories = {};
let chartInstances = {};
let refreshTimer = null;

// ===== Init =====
async function init() {
  // 1. Fetch current prices
  prices = await fetchAllPrices();
  
  // 2. Save today's snapshot to history
  const stored = loadHistory();
  const today = new Date().toISOString().split('T')[0];
  for (const [id, price] of Object.entries(prices)) {
    if (!stored[id]) stored[id] = {};
    stored[id][today] = price;
    // Keep only last 120 days
    const dates = Object.keys(stored[id]).sort();
    while (dates.length > 120) {
      delete stored[id][dates.shift()];
    }
  }
  saveHistory(stored);
  
  // 3. Generate/load 90-day history for each item
  for (const item of ITEMS) {
    histories[item.id] = generateHistory(prices[item.id], 90);
  }
  
  // 4. Render
  render();
  
  // 5. Update time
  document.getElementById('updateTime').innerHTML = `
    <span class="live-dot"></span>实时监控中 · 更新于 ${new Date().toLocaleTimeString('zh-CN')}
  `;
  
  // 6. Auto refresh every 60 seconds (only refresh prices, not full rebuild)
  refreshTimer = setInterval(async () => {
    const newPrices = await fetchAllPrices();
    const today = new Date().toISOString().split('T')[0];
    const stored = loadHistory();
    
    for (const item of ITEMS) {
      if (newPrices[item.id]) {
        prices[item.id] = newPrices[item.id];
        if (!stored[item.id]) stored[item.id] = {};
        stored[item.id][today] = newPrices[item.id];
      }
    }
    saveHistory(stored);
    
    // Update histories with new data point
    for (const item of ITEMS) {
      const h = histories[item.id];
      if (h && h.length > 0) {
        h.push({ date: today, price: prices[item.id] });
        if (h.length > 90) h.shift();
        // Update chart
        if (chartInstances[item.id]) {
          const dates = h.map(d => d.date);
          const vals = h.map(d => d.price);
          chartInstances[item.id].setOption({
            xAxis: { data: dates },
            series: [{ data: vals }]
          });
        }
      }
    }
    
    document.getElementById('updateTime').innerHTML = `
      <span class="live-dot"></span>实时监控中 · 更新于 ${new Date().toLocaleTimeString('zh-CN')}
    `;
  }, 60000);
}

// Resize handler
window.addEventListener('resize', () => {
  Object.values(chartInstances).forEach(c => c.resize());
});

// Start
init();
</script>
</body>
