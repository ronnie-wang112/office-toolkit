<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="克欧克办公工具">
  <title>克欧克办公工具</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="lib/pdf-lib.min.js"></script>
  <script src="lib/pdf.min.js"></script>
  <script src="lib/mammoth.browser.min.js"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="lib/jsQR.js"></script>
  <script src="lib/tesseract.min.js"></script>
  <script src="lib/tesseract.worker.min.js"></script>
  <script src="lib/xlsx.full.min.js"></script>
  <script src="lib/qrcode.min.js"></script>
  <script src="lib/marked.min.js"></script>
  <script src="lib/browser-image-compression.js"></script>
  <script src="lib/face-api.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">O</div>
        <span>克欧克办公工具</span>
      </a>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="infoBtn" title="关于" aria-label="关于">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content" id="mainContent">
    <div class="tool-home" id="cardsGrid"></div>
    <div class="tool-workspace hidden" id="toolWorkspace">
      <div class="back-nav">
        <button class="back-btn" id="backBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          返回
        </button>
      </div>
      <div class="tool-container" id="toolContainer"></div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <div class="modal-overlay hidden" id="aboutModal">
    <div class="modal-content">
      <h2>关于克欧克办公工具</h2>
      <p>纯前端本地运行，所有数据不上传服务器。</p>
      <p>替代 WPS / 夸克 中常见的付费功能。</p>
      <div class="feature-list">
        <span>PDF 合并/拆分/加密</span>
        <span>PDF 压缩（快速/深度）</span>
        <span>图片压缩/转换/裁剪/长截图</span>
        <span>拍照扫描/增强</span>
        <span>Word 转 PDF</span>
        <span>图片擦除/去水印</span>
        <span>材料价格/标签/二维码/Markdown</span>
      </div>
      <p class="version-text">v1.7 · 完全离线可用 · 纯前端</p>
      <button class="btn btn-primary modal-close">关闭</button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/tools/pdf-merge.js"></script>
  <script src="js/tools/pdf-split.js"></script>
  <script src="js/tools/pdf-extract.js"></script>
  <script src="js/tools/pdf-reorder.js"></script>
  <script src="js/tools/pdf-encrypt.js"></script>
  <script src="js/tools/pdf-compress.js"></script>
  <script src="js/tools/img2pdf.js"></script>
  <script src="js/tools/word2pdf.js"></script>
  <script src="js/tools/img-compress.js"></script>
  <script src="js/tools/img-convert.js"></script>
  <script src="js/tools/img-crop.js"></script>
  <script src="js/tools/long-screenshot.js"></script>
  <script src="js/tools/image-inpaint.js"></script>
  <script src="js/tools/scanner.js"></script>
  <script src="js/tools/qrcode-gen.js"></script>
  <script src="js/tools/qrcode-scan.js"></script>
  <script src="js/tools/markdown.js"></script>
  <script src="js/tools/id-photo.js"></script>
  <script src="js/tools/table-extract.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { OfficeToolkit.init(); });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
